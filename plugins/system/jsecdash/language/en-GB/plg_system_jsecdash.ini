PLG_SYSTEM_JSECDASH="System - Joomla Security Dashboard"
PLG_SYSTEM_JSECDASH_XML_DESCRIPTION="Protects the site with login lockout and IP blocking. Configure thresholds below."
PLG_SYSTEM_JSECDASH_FIELD_MAX_ATTEMPTS_LABEL="Max Failed Attempts"
PLG_SYSTEM_JSECDASH_FIELD_MAX_ATTEMPTS_DESC="Number of failed login attempts from the same IP address before it is automatically blocked."
PLG_SYSTEM_JSECDASH_FIELD_ATTEMPT_WINDOW_LABEL="Attempt Window (minutes)"
PLG_SYSTEM_JSECDASH_FIELD_ATTEMPT_WINDOW_DESC="Time window in minutes during which failed attempts are counted towards the threshold."
PLG_SYSTEM_JSECDASH_FIELD_LOCKOUT_MINUTES_LABEL="Lockout Duration (minutes)"
PLG_SYSTEM_JSECDASH_FIELD_LOCKOUT_MINUTES_DESC="How long an automatically blocked IP address stays blocked."
PLG_SYSTEM_JSECDASH_FIELD_ENABLE_IP_BLOCK_LABEL="Enable IP Blocking"
PLG_SYSTEM_JSECDASH_FIELD_WHITELIST_IPS_LABEL="Whitelisted IP Addresses"
PLG_SYSTEM_JSECDASH_FIELD_WHITELIST_IPS_DESC="IP addresses or ranges (one per line) that are never blocked, e.g. your own office IP."

PLG_SYSTEM_JSECDASH_FIELDSET_ALERTS="Email Alerts"
PLG_SYSTEM_JSECDASH_FIELD_ENABLE_EMAIL_ALERT_LABEL="Send Email on Auto-Block"
PLG_SYSTEM_JSECDASH_FIELD_ENABLE_EMAIL_ALERT_DESC="Send an email notification whenever an IP address is automatically blocked."
PLG_SYSTEM_JSECDASH_FIELD_ALERT_EMAIL_LABEL="Alert Email Address"
PLG_SYSTEM_JSECDASH_FIELD_ALERT_EMAIL_DESC="Where to send block notifications. Leave empty to use the site's From email address."

PLG_SYSTEM_JSECDASH_FIELDSET_HARDENING="Back-end Hardening"
PLG_SYSTEM_JSECDASH_FIELD_ADMIN_SECRET_LABEL="Administrator Secret Key"
PLG_SYSTEM_JSECDASH_FIELD_ADMIN_SECRET_DESC="When set, the administrator login is hidden unless this key is added to the URL (e.g. /administrator/?yourkey). Logged-in users and whitelisted IPs are never locked out. Leave empty to disable."

PLG_SYSTEM_JSECDASH_FIELDSET_WAF="Web Application Firewall"
PLG_SYSTEM_JSECDASH_FIELD_WAF_MODE_LABEL="Firewall Mode"
PLG_SYSTEM_JSECDASH_FIELD_WAF_MODE_DESC="Off disables the firewall. Detection only logs suspicious requests without blocking them (recommended for tuning). Block rejects matching requests with a 403 response."
PLG_SYSTEM_JSECDASH_WAF_MODE_OFF="Off"
PLG_SYSTEM_JSECDASH_WAF_MODE_DETECT="Detection only (log)"
PLG_SYSTEM_JSECDASH_WAF_MODE_BLOCK="Block"
PLG_SYSTEM_JSECDASH_FIELD_WAF_CAT_SQLI_LABEL="SQL Injection rules"
PLG_SYSTEM_JSECDASH_FIELD_WAF_CAT_XSS_LABEL="Cross-Site Scripting (XSS) rules"
PLG_SYSTEM_JSECDASH_FIELD_WAF_CAT_LFI_LABEL="File Inclusion / Path Traversal rules"
PLG_SYSTEM_JSECDASH_FIELD_WAF_CAT_CMDI_LABEL="Command Injection rules"
PLG_SYSTEM_JSECDASH_FIELD_WAF_CAT_SCANNER_LABEL="Bad bot / scanner rules"
PLG_SYSTEM_JSECDASH_FIELD_WAF_CAT_EXPLOIT_LABEL="Known exploit path rules"
PLG_SYSTEM_JSECDASH_FIELD_WAF_ESCALATE_THRESHOLD_LABEL="Escalate to IP Block After"
PLG_SYSTEM_JSECDASH_FIELD_WAF_ESCALATE_THRESHOLD_DESC="Number of blocked requests from the same IP address within the escalation window before it is added to the IP block list. Set to 0 to disable escalation."
PLG_SYSTEM_JSECDASH_FIELD_WAF_ESCALATE_WINDOW_LABEL="Escalation Window (minutes)"
PLG_SYSTEM_JSECDASH_FIELD_WAF_ESCALATE_WINDOW_DESC="Time window in minutes over which blocked requests are counted towards the escalation threshold."
PLG_SYSTEM_JSECDASH_FIELD_WAF_CUSTOM_RULES_LABEL="Custom Rules"
PLG_SYSTEM_JSECDASH_FIELD_WAF_CUSTOM_RULES_DESC="Additional regular expressions, one per line (without delimiters). Each is matched case-insensitively against request parameters, the URI and the User-Agent. Invalid expressions are ignored."
PLG_SYSTEM_JSECDASH_FIELD_WAF_TRUST_ADMINS_LABEL="Trust Logged-in Administrators"
PLG_SYSTEM_JSECDASH_FIELD_WAF_TRUST_ADMINS_DESC="Skip firewall inspection for users who are allowed to log in to the administrator back-end. Prevents false positives when staff legitimately submit code, SQL or HTML, at the cost of not inspecting authenticated admin requests."
PLG_SYSTEM_JSECDASH_FIELD_WAF_LOG_RETENTION_LABEL="Log Retention (days)"
PLG_SYSTEM_JSECDASH_FIELD_WAF_LOG_RETENTION_DESC="Automatically delete firewall log entries older than this many days. Set to 0 to keep entries indefinitely."
